{% extends "layout.html" %}
{% block content %}
<div class="analyzer-card">
    <h1>{{ name }}</h1>
    <p>Paste your content below to see the magic happen.</p>
    
    <form action="{{ url_for('post') }}" method="POST">
        <textarea name="content" rows="8" placeholder="Start typing or paste your text here..."></textarea>
        <div style="margin-top: 20px;">
            <button type="submit">Analyze Words</button>
        </div>
    </form>
</div>
{% endblock %}
